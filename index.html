<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main id="base">

        <section id="corpo">

            <div>
                <div id="display"></div>

                <div>
                    <div class="flex">
                        <div class="bloco">1</div>
                        <div class="bloco">2</div>
                        <div class="bloco">3</div>
                        <div class="bloco">=</div>
                    </div>

                    <div class="flex">
                        <div class="bloco">4</div>
                        <div class="bloco">5</div>
                        <div class="bloco">6</div>
                        <div class="bloco">+</div>                        
                    </div>

                    <div class="flex">
                        <div class="bloco">7</div>
                        <div class="bloco">8</div>
                        <div class="bloco">9</div>
                        <div class="bloco">-</div>                        
                    </div>

                    <div class="flex">
                        <div class="bloco">0</div>
                        <div class="bloco">/</div>
                        <div class="bloco">%</div>
                        <div class="bloco">X</div>                        
                    </div>

                </div>

            </div>

        </section>

    </main>

</body>

<script src="logica.js"></script>

</html>
