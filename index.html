<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main id="base">

        <section id="corpo">

            <div>
                <div id="display"></div>

                <div class="flex">

                    <div>
                        <div class="flex">
                            <div class="bloco"><button>1</button></div>
                            <div class="bloco"><button>2</button></div>
                            <div class="bloco"><button>3</button></div>
                            <div class="bloco"><button>+</button></div>
                        </div>

                        <div class="flex">
                            <div class="bloco"><button>4</button></div>
                            <div class="bloco"><button>5</button></div>
                            <div class="bloco"><button>6</button></div>
                            <div class="bloco"><button>-</button></div>
                        </div>

                        <div class="flex">
                            <div class="bloco"><button>7</button></div>
                            <div class="bloco"><button>8</button></div>
                            <div class="bloco"><button>9</button></div>
                            <div class="bloco"><button>X</button></div>
                        </div>

                        <div class="flex">
                            <div class="bloco"><button>0</button></div>
                            <div class="bloco"><button>.</button></div>
                            <div class="bloco"><button>%</button></div>
                            <div class="bloco"><button>=</button></div>
                        </div>
                    </div>

                    <div>
                        <div class="blocoMaior"><button>A<br>C</button></div>
                        <div class="blocoMaior"><button>C</button></div>
                    </div>

                </div>

            </div>

        </section>

    </main>

</body>

<script src="logica.js"></script>

</html>
